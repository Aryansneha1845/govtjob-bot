<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeshNaukri — Free Sarkari Job Alerts</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--card:#1a1d2e;--card2:#22263a;--accent:#f0a500;--accent2:#e05c2a;--text:#e8eaf0;--muted:#8b90a8;--border:#2e3252}
    body{font-family:'Hind',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(15,17,23,0.95);position:sticky;top:0;z-index:100}
    .logo{font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;color:var(--accent);text-decoration:none}
    .logo span{color:var(--accent2)}
    .hero{text-align:center;padding:3rem 1.5rem;background:linear-gradient(135deg,#1a1d2e,#22263a);border-bottom:1px solid var(--border)}
    .hero h1{font-family:'Baloo 2',cursive;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800}
    .hero h1 span{color:var(--accent)}
    .hero p{color:var(--muted);margin-top:0.5rem;font-size:1rem}
    .tg-btn{display:inline-block;margin-top:1.2rem;background:#229ED9;color:#fff;padding:0.7rem 1.5rem;border-radius:30px;text-decoration:none;font-weight:700;font-family:'Baloo 2',cursive;font-size:1rem}
    .container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
    .section-title{font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:700;color:var(--accent);margin-bottom:1.2rem}
    .jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
    .job-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;text-decoration:none;color:var(--text);transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;display:flex;flex-direction:column;gap:0.4rem}
    .job-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.4);border-color:var(--accent)}
    .job-source{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent2);font-weight:700}
    .job-title{font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;line-height:1.3;margin-top:0.2rem}
    .job-org{font-size:0.85rem;color:var(--muted)}
    .loading{text-align:center;color:var(--muted);padding:3rem;font-size:1rem}
    footer{text-align:center;padding:2rem;border-top:1px solid var(--border);color:var(--muted);font-size:0.85rem}
    footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/">Desh<span>Naukri</span></a>
  <a href="https://t.me/DeshNaukri" style="color:#229ED9;text-decoration:none;font-weight:700">📢 Join Telegram</a>
</nav>
<div class="hero">
  <h1>🇮🇳 <span>Desh</span>Naukri</h1>
  <p>Free Sarkari Job Alerts — SSC, UPSC, Railway & More</p>
  <a href="https://t.me/DeshNaukri" class="tg-btn">📲 Join Telegram Channel</a>
</div>
<div class="container">
  <p class="section-title">🔥 Latest Government Jobs</p>
  <div class="jobs-grid" id="jobs-grid">
    <div class="loading">Loading latest jobs...</div>
  </div>
</div>
<footer>
  <p>© 2026 <a href="/">DeshNaukri</a> — Free Sarkari Job Alerts | <a href="https://t.me/DeshNaukri">@DeshNaukri</a></p>
</footer>
<script>
const JOBS_DIR = './jobs/';
const KNOWN_JOBS = [
  "rrb-technician-recruitment-2026.html",
  "ssc-cgl-recruitment-2026.html",
  "konkan-railway-recruitment-2026.html",
  "cisf-paramedical-staff-recruitment-2026.html",
  "upsc-assistant-professor-recruitment-2025.html",
  "railway-rrb-technician-grade-iii-recruitment-2025.html",
  "rrb-alp-recruitment-2026.html",
  "bro-recruitment-2026.html",
];

async function loadJobs() {
  const grid = document.getElementById('jobs-grid');
  grid.innerHTML = '';

  for (const file of KNOWN_JOBS) {
    try {
      const resp = await fetch(`./jobs/${file}`);
      if (!resp.ok) continue;
      const html = await resp.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      const title = doc.querySelector('h1')?.textContent?.trim() || file.replace('.html','').replace(/-/g,' ');
      const org = doc.querySelector('.org-badge')?.textContent?.trim() || 'Government of India';

      const card = document.createElement('a');
      card.href = `./jobs/${file}`;
      card.className = 'job-card';
      card.innerHTML = `
        <span class="job-source">🏛 Govt Job</span>
        <div class="job-title">${title}</div>
        <div class="job-org">${org}</div>
      `;
      grid.appendChild(card);
    } catch(e) {}
  }

  if (!grid.children.length) {
    grid.innerHTML = '<div class="loading">No jobs found. Check back soon!</div>';
  }
}

loadJobs();
</script>
</body>
</html>
